<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Job board with real-time filtering - Find your next developer position">
    <meta name="theme-color" content="#5CA5A5">
    
    <title>Job Board | Real-time Job Listings with Filtering</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for accessibility icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-to-main">Skip to main content</a>
    
    <header class="header" role="banner">
        <h1>Job Board</h1>
        <p>Find your next developer position • Real-time updates</p>
    </header>
    
    <div class="stats-bar" role="contentinfo" aria-label="Job statistics">
        <div>
            <span class="stats-count" id="job-count">0</span>
            <span>positions available</span>
        </div>
        <button class="refresh-btn" id="refresh-btn" aria-label="Refresh job listings">
            <i class="fas fa-sync-alt" aria-hidden="true"></i>
            <span>Refresh</span>
        </button>
    </div>
    
    <div class="filter-section">
        <div class="filter-bar hidden" id="filter-bar" role="region" aria-label="Active filters">
            <div class="filter-tags" id="filter-tags-container"></div>
            <button class="clear-filters" id="clear-filters">Clear all</button>
        </div>
    </div>
    
    <main id="main-content" class="main-content" role="main">
        <div class="jobs-container" id="jobs-container">
            <!-- Loading state -->
            <div class="loading-state" id="loading-state">
                <div class="spinner"></div>
                <p>Loading job listings...</p>
            </div>
        </div>
    </main>
    
    <footer class="footer" role="contentinfo">
        <p>
            Job data sourced in real-time • 
            <a href="#" id="scrape-link">Trigger new scrape</a> • 
            Built with accessibility and performance in mind
        </p>
        <p style="margin-top: var(--spacing-sm);">
            Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
            Coded by Zaklina Radivojevic
        </p>
    </footer>
    
    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
